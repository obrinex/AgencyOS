services:
  - type: web
    name: agencyos-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: agencyos
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: VAULT_ENCRYPTION_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: RUN_BACKGROUND_LOOPS
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: SENDER_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-70b-instruct
      # Cashfree Payments — set both keys in the Render dashboard (sync: false
      # keeps secrets out of this file and out of git).
      - key: CASHFREE_APP_ID
        sync: false
      - key: CASHFREE_SECRET_KEY
        sync: false
      - key: CASHFREE_ENV
        value: production
      # Public URL of this service, so Cashfree can deliver payment webhooks to
      # <BACKEND_URL>/api/public/cashfree/webhook
      - key: BACKEND_URL
        sync: false
      # Only used if every live FX feed and the cached rate are unavailable.
      - key: FX_FALLBACK_USD_INR
        value: "88"
